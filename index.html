<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VHSE RESULTS 2026</title>

<script>
function validateForm() {
    var regno = document.getElementById("regno").value.trim();
    var dob = document.getElementById("date1").value.trim();

    if (regno === "25377120" && dob === "27-01-2008") {
        // Redirects to a new HTML page instead of the image
        window.location.replace("result.html"); 
    } else {
        alert("Invalid registration number or date of birth.");
    }

    return false;
}
</script>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 0;
    background: #fff;
    text-align: center;
}

.container {
    margin-top: 30px;
}

input {
    width: 280px;
    padding: 10px;
    margin: 8px;
    font-size: 16px;
}

button {
    width: 300px; /* Fixed typo here: removed the trailing 's' */
    padding: 10px;
    background: #3399cc;
    color: #fff;
    border: none;
    font-size: 18px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="container">

<img src="top.img.png" width="387" height="99" alt="VHSE Header"><br><br>
<img src="result-min1.png" width="120" height="80" alt="Result Logo"><br><br>

<h2>Kerala VHSE Result - 2026</h2>

<form onsubmit="return validateForm();">
    <input type="text" id="regno" placeholder="Register Number" required><br>
    <input type="text" id="date1" placeholder="DD-MM-YYYY" required><br>
    <button type="submit">Submit</button>
</form>

</div>

</body>
</html>
